name: Code Quality

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          
      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json found, skipping npm ci."
          fi
        
      - name: Lint Workspaces
        run: |
          if [ -f package.json ]; then
            npm run lint --workspaces --if-present || true
          else
            echo "No package.json found, skipping lint."
          fi

name: Backend CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          if [ -f services/core/requirements.txt ]; then
            pip install -r services/core/requirements.txt
          else
            echo "No requirements.txt found, skipping pip install."
          fi
        
      - name: Run Tests
        run: |
          if [ -d services/core ]; then
            pytest services/core --if-present || echo "No tests found or pytest not installed."
          fi

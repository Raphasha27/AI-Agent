name: 🇿🇦 Sumbandila National Security Shield

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  security-shield:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛡️ NPM Audit (Frontend)
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high
          else
            echo "No package.json found, skipping NPM audit."
          fi

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛡️ Python Audit (Backend)
        run: |
          pip install bandit safety
          # Scan core services and scripts
          if [ -d services/core ]; then
            bandit -r services/core/ -ll
          fi
          if [ -d scripts ]; then
            bandit -r scripts/ -ll
          fi

      - name: 🛰️ L5 Sentinel Check
        run: python scripts/local_security_audit.py --mode transport-layer-check

      - name: ⚖️ POPIA DLP Scan
        run: python scripts/local_security_audit.py --mode popia-compliance

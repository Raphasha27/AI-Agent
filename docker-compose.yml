version: '3.8'

services:
  # Professional Reverse Proxy
  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/production/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - future_agi
    networks:
      - agi_network

  # Intelligence Core (Python)
  future_agi:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - PORT=29000
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:29000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agi_network

  # SaaS Backend (Python/Laravel Mock)
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite:///./prod.db
    volumes:
      - ./backend/data:/app/data
    networks:
      - agi_network

  # Real-time Persistence
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - agi_network

networks:
  agi_network:
    driver: bridge

volumes:
  db_data:
  redis_data:

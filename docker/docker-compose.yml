version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: future_agi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       future_agi
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d future_agi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Future AGI Portal (High Throughput) ───────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: future_agi_portal
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/future_agi
    ports:
      - "29000:8000" # High-throughput enterprise port
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - agent_workspace:/tmp/agent_workspace

  # ── Future AGI Dashboard ──────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: future_agi_dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  agent_workspace:

<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <rect width="800" height="450" fill="#0d1117" rx="10"/>
  <rect width="800" height="30" fill="#161b22" rx="10"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="15" r="5" fill="#ffbd2e"/>
  <circle cx="60" cy="15" r="5" fill="#27c93f"/>
  <text x="80" y="20" fill="#8b949e" font-size="12">audit.py — Security Scanner</text>

  <g font-size="14">
    <text x="20" y="60" fill="#c9d1d9">
      <animate attributeName="opacity" values="0;1;1;1" dur="4s" repeatCount="indefinite" begin="0s"/>
      $ python scripts/audit.py --scan .
    </text>
    
    <text x="20" y="90" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      ════════════════════════════════════════════════════════════
    </text>
    <text x="20" y="110" fill="#c9d1d9" font-weight="bold">
      <animate attributeName="opacity" values="0;0;1;1" dur="4s" repeatCount="indefinite" begin="0.7s"/>
      EventHive Security Audit — Kirov Dynamics Technology
    </text>
    <text x="20" y="130" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1" dur="4s" repeatCount="indefinite" begin="0.9s"/>
      ════════════════════════════════════════════════════════════
    </text>

    <text x="20" y="160" fill="#c9d1d9">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite" begin="1.2s"/>
      Scanned : /workspace/Github-Harden
    </text>
    <text x="20" y="180" fill="#c9d1d9">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite" begin="1.4s"/>
      Files   : 142  |  Lines: 12,402
    </text>

    <text x="20" y="210" fill="#39d353">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite" begin="1.8s"/>
      ✅ No issues found. Repository is clean.
    </text>

    <text x="20" y="240" fill="#39d353" font-weight="bold">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite" begin="2.2s"/>
      Result  : PASSED
    </text>
    
    <text x="20" y="260" fill="#c9d1d9">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite" begin="2.4s"/>
      Critical: 0  High: 0  Total findings: 0
    </text>

    <text x="20" y="290" fill="#8b949e">
      <animate attributeName="opacity" values="0;0;0;1" dur="4s" repeatCount="indefinite" begin="3.0s"/>
      $ _
      <animate attributeName="visibility" values="visible;hidden;visible" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
